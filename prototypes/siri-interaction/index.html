<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="data:," />
		<title>Siri Interaction Study</title>
		<meta
			name="description"
			content="A center-only local WebGL interaction study with a glass orb, ask chips, and reply pill."
		/>
		<meta name="theme-color" content="#000000" />

		<script type="module" src="/shader/siriai/js/main.js"></script>
		<link rel="stylesheet" href="/shader/siriai/styles/base.css" />
		<link rel="stylesheet" href="/shader/siriai/styles/siri27.css" />
	</head>
	<body>
		<main class="siri-page">
			<h1 class="sr-only">Siri interaction study</h1>
			<p class="sr-only">
				A WebGL glass orb interaction with an ask panel, suggestion chips, and reply state.
			</p>
			<noscript><p>This interactive Siri shader needs JavaScript and a WebGL2-capable browser.</p></noscript>
			<canvas id="siri27-canvas" class="siri-canvas" aria-label="Siri glass orb shader"></canvas>

			<div id="pill-overlay" class="pill-overlay">
				<div id="ask-panel" class="ask-panel">
					<form id="ask-form" class="ask-form" autocomplete="off">
						<input
							id="ask-input"
							type="text"
							placeholder="Ask Siri"
							maxlength="200"
							autocomplete="off"
							autocapitalize="off"
							spellcheck="false"
							enterkeyhint="send"
							aria-label="Ask Siri"
						/>
					</form>
					<div id="ask-chips" class="ask-chips" aria-label="Suggested questions">
						<button type="button">who are you?</button>
						<button type="button">what is 30X?</button>
						<button type="button">show me your projects</button>
					</div>
				</div>
				<p id="answer-card" class="answer-card" aria-live="polite"><span id="answer-text"></span></p>
			</div>

			<p id="mic-status" class="sr-only" aria-live="polite">Idle.</p>
		</main>
	</body>
</html>
