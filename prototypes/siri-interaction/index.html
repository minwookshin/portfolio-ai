<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Siri Glass Orb Clone Lab</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --fg: #f5f5f7;
        --muted: rgba(245, 245, 247, 0.58);
        --dim: rgba(245, 245, 247, 0.26);
        --glass: rgba(4, 4, 5, 0.54);
        --glass-border: rgba(245, 245, 247, 0.075);
        --glass-border-strong: rgba(245, 245, 247, 0.16);
        --pill: rgba(245, 245, 247, 0.105);
        --pill-hover: rgba(245, 245, 247, 0.17);
        --shadow: rgba(0, 0, 0, 0.72);
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
        --soft: cubic-bezier(0.23, 1, 0.32, 1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: #000;
        color: var(--fg);
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "SF Pro Text",
          "Helvetica Neue",
          Arial,
          sans-serif;
        letter-spacing: 0;
      }

      button,
      input {
        font: inherit;
      }

      button {
        appearance: none;
        border: 0;
        cursor: pointer;
      }

      .app {
        position: relative;
        width: 100vw;
        min-height: 100vh;
        overflow: hidden;
        background: #000;
        isolation: isolate;
      }

      .app[data-backdrop="white"] {
        background: #fafafa;
        color: #161618;
        --fg: #161618;
        --muted: rgba(22, 22, 24, 0.56);
        --dim: rgba(22, 22, 24, 0.24);
        --glass: rgba(250, 250, 250, 0.52);
        --glass-border: rgba(22, 22, 24, 0.07);
        --glass-border-strong: rgba(22, 22, 24, 0.14);
        --pill: rgba(22, 22, 24, 0.08);
        --pill-hover: rgba(22, 22, 24, 0.13);
        --shadow: rgba(22, 22, 24, 0.14);
      }

      .app[data-backdrop="tahoe"] {
        background:
          linear-gradient(rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.1)),
          radial-gradient(circle at 18% 92%, rgba(139, 222, 204, 0.92) 0 18%, transparent 45%),
          radial-gradient(circle at 80% 55%, rgba(16, 107, 149, 0.95) 0 24%, transparent 52%),
          linear-gradient(#3593c5 0 42%, #86d4d6 43% 62%, #73cabc 63% 100%);
      }

      .app[data-backdrop="sonoma"] {
        background:
          radial-gradient(circle at 72% 36%, rgba(255, 119, 88, 0.86) 0 16%, transparent 38%),
          radial-gradient(circle at 28% 62%, rgba(90, 68, 255, 0.72) 0 22%, transparent 48%),
          linear-gradient(135deg, #1b102f, #32185d 42%, #bf5d63 100%);
      }

      .app::after {
        position: absolute;
        inset: 0;
        z-index: 0;
        background: radial-gradient(circle at center, transparent 0 42%, rgba(0, 0, 0, 0.34) 100%);
        content: "";
        pointer-events: none;
      }

      .chrome {
        position: absolute;
        inset: 0 0 auto;
        z-index: 10;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        height: 58px;
        padding: 0 32px;
        pointer-events: none;
      }

      .home,
      .credits-trigger {
        color: var(--fg);
        font-size: 14px;
        font-weight: 650;
        text-shadow: 0 1px 18px rgba(0, 0, 0, 0.72);
        pointer-events: auto;
        text-decoration: none;
      }

      .credits-trigger {
        justify-self: end;
        background: transparent;
        padding: 8px 0;
      }

      .switcher {
        display: flex;
        gap: 10px;
        justify-self: center;
        pointer-events: auto;
      }

      .dot-button {
        width: 8px;
        height: 8px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.48);
        padding: 0;
        opacity: 0.7;
        transition:
          opacity 160ms ease-out,
          transform 160ms var(--ease),
          border-color 160ms ease-out;
      }

      .dot-button[data-backdrop="white"] {
        background: #d8d8dd;
      }

      .dot-button[data-backdrop="black"] {
        background: #111;
      }

      .dot-button[data-backdrop="tahoe"] {
        background: #1f83c4;
      }

      .dot-button[data-backdrop="sonoma"] {
        background: #a26337;
      }

      .dot-button:hover,
      .dot-button:focus-visible,
      .dot-button[aria-pressed="true"] {
        border-color: rgba(255, 255, 255, 0.5);
        opacity: 1;
        outline: none;
        transform: scale(1.18);
      }

      .orb-stage {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: grid;
        place-items: center;
      }

      #orbCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        cursor: grab;
        touch-action: none;
      }

      .app[data-dragging="true"] #orbCanvas {
        cursor: grabbing;
      }

      .orb-hit {
        position: absolute;
        left: 50%;
        top: 50%;
        z-index: 4;
        width: 160px;
        height: 160px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .ask-panel {
        position: absolute;
        left: 50%;
        top: 50%;
        z-index: 5;
        display: grid;
        width: min(458px, calc(100vw - 42px));
        min-height: 146px;
        align-content: start;
        border: 1px solid var(--glass-border);
        border-radius: 72px;
        background: var(--glass);
        box-shadow:
          0 22px 80px var(--shadow),
          inset 0 1px 0 rgba(255, 255, 255, 0.07),
          inset 0 -1px 0 rgba(255, 255, 255, 0.025);
        backdrop-filter: blur(24px) saturate(1.18);
        opacity: 0;
        padding: 34px 28px 28px;
        pointer-events: none;
        transform: translate(-50%, calc(-50% + 1px)) scale(0.86);
        transition:
          opacity 220ms ease-out,
          transform 560ms var(--soft),
          border-color 240ms ease-out;
      }

      .app[data-state="asking"] .ask-panel,
      .app[data-state="thinking"] .ask-panel,
      .app[data-state="answered"] .ask-panel {
        opacity: 1;
        pointer-events: auto;
        transform: translate(-50%, calc(-50% + 1px)) scale(1);
      }

      .app[data-state="thinking"] .ask-panel {
        border-color: transparent;
      }

      .prompt {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 28px;
        border: 0;
        background: transparent;
        color: var(--fg);
        font-size: 18px;
        outline: none;
        padding: 0 0 0 2px;
      }

      .prompt::placeholder {
        color: var(--dim);
      }

      .chips {
        position: relative;
        z-index: 2;
        display: flex;
        flex-wrap: nowrap;
        gap: 8px;
        margin-top: 18px;
      }

      .chip {
        min-height: 31px;
        border: 1px solid rgba(255, 255, 255, 0.045);
        border-radius: 999px;
        background: var(--pill);
        color: var(--fg);
        padding: 0 13px;
        font-size: 12px;
        font-weight: 650;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 8px 24px rgba(0, 0, 0, 0.28);
        transition:
          background 150ms ease-out,
          transform 180ms var(--ease);
      }

      .chip:hover,
      .chip:focus-visible {
        background: var(--pill-hover);
        outline: none;
      }

      .chip:active {
        transform: scale(0.96);
      }

      .app[data-state="thinking"] .prompt,
      .app[data-state="thinking"] .chips,
      .app[data-state="answered"] .prompt,
      .app[data-state="answered"] .chips {
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease-out;
      }

      .answer {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        opacity: 0;
        pointer-events: none;
        z-index: 1;
        color: rgba(245, 245, 247, 0.18);
        font-size: 13px;
        font-weight: 650;
        text-align: center;
        transition: opacity 240ms ease-out;
      }

      .app[data-state="answered"] .answer {
        opacity: 1;
      }

      .thinking-ring {
        position: absolute;
        left: 50%;
        top: 50%;
        z-index: 6;
        width: 118px;
        height: 118px;
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, -50%) scale(0.72);
        transition:
          opacity 180ms ease-out,
          transform 380ms var(--soft);
      }

      .app[data-state="thinking"] .thinking-ring {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        animation: spin 1300ms linear infinite;
      }

      .ring-dot {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(245, 245, 247, 0.78);
        box-shadow: 0 0 16px rgba(245, 245, 247, 0.46);
      }

      .ring-dot:nth-child(1) {
        transform: rotate(0deg) translateX(59px);
      }

      .ring-dot:nth-child(2) {
        transform: rotate(60deg) translateX(59px);
      }

      .ring-dot:nth-child(3) {
        transform: rotate(120deg) translateX(59px);
      }

      .ring-dot:nth-child(4) {
        transform: rotate(180deg) translateX(59px);
      }

      .ring-dot:nth-child(5) {
        transform: rotate(240deg) translateX(59px);
      }

      .ring-dot:nth-child(6) {
        transform: rotate(300deg) translateX(59px);
      }

      .wave {
        position: absolute;
        left: 50%;
        top: calc(50% + 94px);
        z-index: 4;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, 8px) scale(0.9);
        transition:
          opacity 180ms ease-out,
          transform 420ms var(--soft);
      }

      .app[data-state="listening"] .wave {
        opacity: 1;
        transform: translate(-50%, 0) scale(1);
      }

      .wave span {
        display: block;
        width: 4px;
        height: 10px;
        border-radius: 999px;
        background: rgba(245, 245, 247, 0.88);
        box-shadow: 0 0 16px rgba(71, 116, 255, 0.5);
        animation: voice 720ms ease-in-out infinite alternate;
      }

      .wave span:nth-child(2) {
        animation-delay: 70ms;
      }

      .wave span:nth-child(3) {
        animation-delay: 140ms;
      }

      .wave span:nth-child(4) {
        animation-delay: 210ms;
      }

      .wave span:nth-child(5) {
        animation-delay: 280ms;
      }

      .status {
        position: absolute;
        left: 50%;
        bottom: 29px;
        z-index: 6;
        min-width: 260px;
        color: var(--fg);
        font-size: 15px;
        font-weight: 700;
        text-align: center;
        text-shadow: 0 1px 18px rgba(0, 0, 0, 0.8);
        transform: translateX(-50%);
        transition: opacity 160ms ease-out;
      }

      .credits {
        position: absolute;
        right: 30px;
        top: 54px;
        z-index: 12;
        width: 260px;
        border: 1px solid var(--glass-border-strong);
        border-radius: 20px;
        background: rgba(12, 12, 14, 0.72);
        box-shadow: 0 20px 70px rgba(0, 0, 0, 0.56);
        backdrop-filter: blur(20px);
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        opacity: 0;
        padding: 16px;
        pointer-events: none;
        transform: translateY(-6px) scale(0.98);
        transition:
          opacity 180ms ease-out,
          transform 220ms var(--ease);
      }

      .credits[aria-hidden="false"] {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0) scale(1);
      }

      .credits strong {
        display: block;
        margin-bottom: 8px;
        color: var(--fg);
        font-size: 13px;
      }

      .credits a {
        color: var(--fg);
        text-decoration: none;
      }

      @keyframes spin {
        to {
          rotate: 360deg;
        }
      }

      @keyframes voice {
        from {
          height: 8px;
          opacity: 0.42;
        }
        to {
          height: 32px;
          opacity: 1;
        }
      }

      @media (max-width: 560px) {
        .chrome {
          height: 58px;
          padding: 0 24px;
        }

        .home,
        .credits-trigger {
          font-size: 14px;
        }

        .ask-panel {
          width: calc(100vw - 62px);
          min-height: 154px;
          border-radius: 58px;
          padding: 28px;
        }

        .chips {
          max-width: 284px;
          flex-wrap: wrap;
        }

        .status {
          bottom: 31px;
          font-size: 15px;
        }

        .credits {
          left: 24px;
          right: 24px;
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="app" data-backdrop="black" data-state="idle" data-dragging="false">
      <header class="chrome">
        <a class="home" href="#" aria-label="z1han home">z1han</a>
        <nav class="switcher" aria-label="Backdrop">
          <button class="dot-button" type="button" data-backdrop="white" aria-label="White backdrop" aria-pressed="false"></button>
          <button class="dot-button" type="button" data-backdrop="black" aria-label="Black backdrop" aria-pressed="true"></button>
          <button class="dot-button" type="button" data-backdrop="tahoe" aria-label="Tahoe Beach wallpaper" aria-pressed="false"></button>
          <button class="dot-button" type="button" data-backdrop="sonoma" aria-label="Sonoma Horizon wallpaper" aria-pressed="false"></button>
        </nav>
        <button class="credits-trigger" type="button" aria-expanded="false">credits</button>
      </header>

      <section class="orb-stage" aria-label="Siri glass orb clone">
        <canvas id="orbCanvas" width="1200" height="1200" aria-label="Interactive glass orb"></canvas>
        <span class="orb-hit" aria-hidden="true"></span>

        <section class="ask-panel" aria-label="Ask panel">
          <input class="prompt" placeholder="Ask Siri" aria-label="Ask Siri" />
          <div class="chips" aria-label="Suggestions">
            <button class="chip" type="button">who are you?</button>
            <button class="chip" type="button">what is 30X?</button>
            <button class="chip" type="button">show me your projects</button>
          </div>
          <div class="answer">no answer right now</div>
        </section>

        <div class="thinking-ring" aria-hidden="true">
          <span class="ring-dot"></span>
          <span class="ring-dot"></span>
          <span class="ring-dot"></span>
          <span class="ring-dot"></span>
          <span class="ring-dot"></span>
          <span class="ring-dot"></span>
        </div>

        <div class="wave" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <p class="status" aria-live="polite">Click to ask · hold to speak</p>
      </section>

      <aside class="credits" aria-hidden="true">
        <strong>credits</strong>
        siri27 · Xiaolin<br />
        siriWaveCore · aaaa-zhen<br /><br />
        remix by z1han — soft-bloom wave, gather-burst finale, rebuilt as readable source
      </aside>
    </main>

    <script>
      const app = document.querySelector(".app");
      const canvas = document.querySelector("#orbCanvas");
      const ctx = canvas.getContext("2d");
      const promptInput = document.querySelector(".prompt");
      const statusText = document.querySelector(".status");
      const credits = document.querySelector(".credits");
      const creditsTrigger = document.querySelector(".credits-trigger");
      const backdropButtons = Array.from(document.querySelectorAll(".dot-button"));
      const chips = Array.from(document.querySelectorAll(".chip"));

      const state = {
        mode: "idle",
        backdrop: "black",
        start: performance.now(),
        holdTimer: 0,
        timers: [],
        pointerDownAt: null,
        drag: { x: 0, y: 0, targetX: 0, targetY: 0, active: false },
      };

      function clearTimers() {
        state.timers.forEach((timer) => window.clearTimeout(timer));
        state.timers = [];
        window.clearTimeout(state.holdTimer);
        state.holdTimer = 0;
      }

      function setMode(mode) {
        state.mode = mode;
        app.dataset.state = mode;
        if (mode === "idle") statusText.textContent = "Click to ask · hold to speak";
        if (mode === "asking") statusText.textContent = "Enter to send · Esc to close";
        if (mode === "listening") statusText.textContent = "Listening…";
        if (mode === "thinking") statusText.textContent = "";
        if (mode === "answered") statusText.textContent = "";
      }

      function setBackdrop(backdrop) {
        state.backdrop = backdrop;
        app.dataset.backdrop = backdrop;
        backdropButtons.forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.backdrop === backdrop));
        });
      }

      function openAsk() {
        clearTimers();
        promptInput.value = "";
        setMode("asking");
        window.setTimeout(() => promptInput.focus(), 80);
      }

      function startListening() {
        clearTimers();
        setMode("listening");
      }

      function submitPrompt() {
        clearTimers();
        setMode("thinking");
        state.timers.push(window.setTimeout(() => setMode("answered"), 1500));
      }

      function resetIdle() {
        clearTimers();
        promptInput.value = "";
        state.drag.targetX = 0;
        state.drag.targetY = 0;
        setMode("idle");
      }

      function resizeCanvas() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const width = Math.round(window.innerWidth * dpr);
        const height = Math.round(window.innerHeight * dpr);
        if (canvas.width !== width || canvas.height !== height) {
          canvas.width = width;
          canvas.height = height;
        }
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function orbCenter() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        return {
          x: vw / 2 + state.drag.x,
          y: vh / 2 + state.drag.y,
          radius: Math.min(vw, vh) <= 560 ? 64 : 66,
        };
      }

      function drawOrbFrame(now) {
        resizeCanvas();
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        ctx.clearRect(0, 0, vw, vh);

        state.drag.x += (state.drag.targetX - state.drag.x) * 0.08;
        state.drag.y += (state.drag.targetY - state.drag.y) * 0.08;

        if (state.mode === "asking" || state.mode === "answered") {
          requestAnimationFrame(drawOrbFrame);
          return;
        }

        const { x, y, radius } = orbCenter();
        const t = (now - state.start) / 1000;
        const active = state.mode === "listening" || state.mode === "thinking";
        const r = radius + Math.sin(t * 1.6) * (active ? 4 : 2);

        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        const glow = ctx.createRadialGradient(x, y, 4, x, y, r * 3.0);
        glow.addColorStop(0, active ? "rgba(78,120,255,0.26)" : "rgba(68,94,255,0.16)");
        glow.addColorStop(0.38, "rgba(66,118,255,0.08)");
        glow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(x, y, r * 3.0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.clip();

        const body = ctx.createRadialGradient(x - r * 0.35, y - r * 0.55, 2, x, y, r * 1.18);
        body.addColorStop(0, "rgba(255,246,206,0.28)");
        body.addColorStop(0.22, "rgba(255,204,126,0.12)");
        body.addColorStop(0.45, "rgba(36,42,74,0.22)");
        body.addColorStop(0.74, "rgba(16,18,24,0.76)");
        body.addColorStop(1, "rgba(0,0,0,0.88)");
        ctx.fillStyle = body;
        ctx.fillRect(x - r, y - r, r * 2, r * 2);

        const lower = ctx.createLinearGradient(x - r, y, x + r, y + r * 0.18);
        lower.addColorStop(0, "rgba(0,0,0,0)");
        lower.addColorStop(0.25, "rgba(255,245,188,0.44)");
        lower.addColorStop(0.5, "rgba(255,255,232,0.58)");
        lower.addColorStop(0.72, "rgba(48,104,255,0.3)");
        lower.addColorStop(1, "rgba(0,0,0,0)");
        ctx.strokeStyle = lower;
        ctx.lineWidth = 8;
        ctx.beginPath();
        for (let i = 0; i <= 100; i += 1) {
          const p = i / 100;
          const px = x - r * 0.92 + p * r * 1.84;
          const py = y + Math.sin((p * Math.PI * 2) + t * 0.8) * 4 + Math.sin((p - 0.5) * Math.PI) * 13;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.stroke();

        const spectral = ctx.createLinearGradient(x - r, y - r * 0.08, x + r, y - r * 0.16);
        spectral.addColorStop(0, "rgba(0,0,0,0)");
        spectral.addColorStop(0.22, "rgba(60,166,255,0.66)");
        spectral.addColorStop(0.45, "rgba(255,88,42,0.72)");
        spectral.addColorStop(0.58, "rgba(255,222,116,0.62)");
        spectral.addColorStop(0.76, "rgba(74,255,175,0.52)");
        spectral.addColorStop(1, "rgba(0,0,0,0)");
        ctx.strokeStyle = spectral;
        ctx.lineWidth = active ? 10 : 8;
        ctx.beginPath();
        for (let i = 0; i <= 110; i += 1) {
          const p = i / 110;
          const px = x - r * 0.9 + p * r * 1.8;
          const py = y - r * 0.05 + Math.sin(p * Math.PI * 2 + t * 1.2) * 3;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.stroke();

        ctx.globalCompositeOperation = "screen";
        const highlight = ctx.createLinearGradient(x - r * 0.9, y - r * 0.56, x + r * 0.76, y - r * 0.1);
        highlight.addColorStop(0.04, "rgba(255,255,255,0)");
        highlight.addColorStop(0.45, "rgba(255,255,226,0.42)");
        highlight.addColorStop(0.58, "rgba(140,154,255,0.18)");
        highlight.addColorStop(0.94, "rgba(255,255,255,0)");
        ctx.fillStyle = highlight;
        ctx.translate(x, y);
        ctx.rotate(-0.18 + Math.sin(t * 0.5) * 0.035);
        ctx.fillRect(-r * 0.96, -r * 0.44, r * 1.92, r * 0.34);
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.36)";
        ctx.lineWidth = 1.1;
        ctx.beginPath();
        ctx.arc(x, y, r + 0.5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = "rgba(92,95,255,0.44)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, r + 3, Math.PI * 0.76, Math.PI * 1.86);
        ctx.stroke();
        ctx.strokeStyle = "rgba(255,224,162,0.4)";
        ctx.beginPath();
        ctx.arc(x, y, r + 2, Math.PI * 1.08, Math.PI * 1.86);
        ctx.stroke();
        ctx.restore();

        requestAnimationFrame(drawOrbFrame);
      }

      function pointFromEvent(event) {
        return { x: event.clientX - window.innerWidth / 2, y: event.clientY - window.innerHeight / 2 };
      }

      canvas.addEventListener("pointerdown", (event) => {
        canvas.setPointerCapture(event.pointerId);
        state.pointerDownAt = pointFromEvent(event);
        state.drag.active = true;
        app.dataset.dragging = "true";
        state.holdTimer = window.setTimeout(startListening, 420);
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!state.drag.active || !state.pointerDownAt) return;
        const point = pointFromEvent(event);
        state.drag.targetX = Math.max(-84, Math.min(84, point.x - state.pointerDownAt.x));
        state.drag.targetY = Math.max(-74, Math.min(74, point.y - state.pointerDownAt.y));
      });

      canvas.addEventListener("pointerup", () => {
        const wasListening = state.mode === "listening";
        window.clearTimeout(state.holdTimer);
        state.holdTimer = 0;
        state.pointerDownAt = null;
        state.drag.active = false;
        app.dataset.dragging = "false";
        state.drag.targetX *= 0.28;
        state.drag.targetY *= 0.28;
        if (!wasListening && state.mode === "idle") openAsk();
        if (wasListening) {
          state.timers.push(window.setTimeout(() => setMode("idle"), 700));
        }
      });

      canvas.addEventListener("pointercancel", () => {
        window.clearTimeout(state.holdTimer);
        state.holdTimer = 0;
        state.pointerDownAt = null;
        state.drag.active = false;
        app.dataset.dragging = "false";
      });

      promptInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          submitPrompt();
        }
        if (event.key === "Escape") {
          event.preventDefault();
          resetIdle();
        }
      });

      chips.forEach((chip) => {
        chip.addEventListener("click", () => {
          promptInput.value = chip.textContent.trim();
          submitPrompt();
        });
      });

      backdropButtons.forEach((button) => {
        button.addEventListener("click", () => setBackdrop(button.dataset.backdrop));
      });

      creditsTrigger.addEventListener("click", () => {
        const expanded = creditsTrigger.getAttribute("aria-expanded") === "true";
        creditsTrigger.setAttribute("aria-expanded", String(!expanded));
        credits.setAttribute("aria-hidden", String(expanded));
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && state.mode !== "idle") resetIdle();
      });

      setBackdrop("black");
      setMode("idle");
      requestAnimationFrame(drawOrbFrame);
    </script>
  </body>
</html>
